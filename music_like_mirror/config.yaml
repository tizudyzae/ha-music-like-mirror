name: Music Like Mirror
version: "0.1.1"
slug: music_like_mirror
description: Mirror Spotify and YouTube Music likes in an append-only way.
url: "https://github.com/yourname/ha-music-like-mirror"
startup: services
boot: auto
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ingress: true
ingress_port: 8099
panel_icon: mdi:music-sync
panel_title: Music Like Mirror
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Web UI (optional when using Ingress)
map:
  - addon_config:rw
  - share:rw
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
